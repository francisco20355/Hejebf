<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora con Procedimiento</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f1f5f9;
            --calc-bg: #1e293b;
            --text-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .calc-container {
            background: var(--calc-bg);
            padding: 20px;
            border-radius: 25px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        #display {
            width: 100%;
            height: 60px;
            background: #0f172a;
            border-radius: 12px;
            color: #10b981;
            text-align: right;
            font-size: 1.8rem;
            padding: 10px;
            border: none;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 55px;
            border-radius: 12px;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        .num { background: #334155; color: white; }
        .op { background: var(--primary); color: white; }
        .action { background: #ef4444; color: white; }
        .equal { background: #10b981; color: white; grid-column: span 2; }

        #procedimiento {
            margin-top: 20px;
            width: 100%;
            max-width: 340px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            display: none;
            border-left: 5px solid var(--primary);
        }

        .step { margin-bottom: 10px; font-size: 0.95rem; }
        .res-final { color: #10b981; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="calc-container">
    <input type="text" id="display" value="0" readonly>
    <div class="buttons">
        <button class="action" onclick="limpiar()">C</button>
        <button class="action" onclick="borrarUno()">←</button>
        <button class="op" onclick="agregar('/')">÷</button>
        <button class="op" onclick="agregar('*')">×</button>
        
        <button class="num" onclick="agregar('7')">7</button>
        <button class="num" onclick="agregar('8')">8</button>
        <button class="num" onclick="agregar('9')">9</button>
        <button class="op" onclick="agregar('-')">−</button>
        
        <button class="num" onclick="agregar('4')">4</button>
        <button class="num" onclick="agregar('5')">5</button>
        <button class="num" onclick="agregar('6')">6</button>
        <button class="op" onclick="agregar('+')">+</button>
        
        <button class="num" onclick="agregar('1')">1</button>
        <button class="num" onclick="agregar('2')">2</button>
        <button class="num" onclick="agregar('3')">3</button>
        <button class="num" onclick="agregar('.')">.</button>
        
        <button class="num" onclick="agregar('0')">0</button>
        <button class="equal" onclick="resolver()">Mostrar Procedimiento</button>
    </div>
</div>

<div id="procedimiento">
    <h4>📝 Procedimiento Paso a Paso:</h4>
    <div id="pasos"></div>
</div>

<script>
    const disp = document.getElementById('display');
    const procDiv = document.getElementById('procedimiento');
    const pasosDiv = document.getElementById('pasos');

    function agregar(v) {
        if (disp.value === "0") disp.value = v;
        else disp.value += v;
    }

    function limpiar() {
        disp.value = "0";
        procDiv.style.display = "none";
    }

    function borrarUno() {
        disp.value = disp.value.slice(0, -1) || "0";
    }

    function resolver() {
        const cuenta = disp.value;
        try {
            const resultado = eval(cuenta);
            
            // Mostrar el cuadro de procedimiento
            procDiv.style.display = "block";
            
            // Crear el texto del procedimiento
            let detalle = cuenta.replace(/\*/g, ' × ').replace(/\//g, ' ÷ ');
            
            pasosDiv.innerHTML = `
                <div class="step"><strong>1. Operación ingresada:</strong><br>${detalle}</div>
                <div class="step"><strong>2. Aplicando cálculo:</strong><br>Se procesan los números según el orden matemático.</div>
                <div class="step"><strong>3. Resultado:</strong><br>
                    <span class="res-final">${resultado}</span>
                </div>
            `;
            
            disp.value = resultado;

            if (navigator.vibrate) navigator.vibrate(50);
        } catch {
            alert("Cuenta mal escrita");
        }
    }
</script>

</body>
</html>
