<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro con Fórmulas</title>
    <!-- MathJax para que las fórmulas se vean perfectas -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; }

        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px; /* Evita zoom automático en iPhone */
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); opacity: 0.9; }

        #resultado-area {
            margin-top: 25px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .formula-display {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            overflow-x: auto;
            text-align: center;
        }

        .final-val {
            font-size: 1.2rem;
            font-weight: bold;
            color: #059669;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora de Áreas</h2>
    
    <div class="input-group">
        <label>Base (cm)</label>
        <input type="number" id="base" placeholder="Ej: 10">
    </div>

    <div class="input-group">
        <label>Altura (cm)</label>
        <input type="number" id="altura" placeholder="Ej: 5">
    </div>

    <button onclick="procesarCalculo()">Calcular Paso a Paso</button>

    <div id="resultado-area">
        <p><strong>1. Fórmula usada:</strong></p>
        <div class="formula-display" id="f-estatica">
            \[ A = \frac{b \times h}{2} \]
        </div>

        <p><strong>2. Sustitución:</strong></p>
        <div class="formula-display" id="f-sustitucion"></div>

        <p><strong>3. Resultado final:</strong></p>
        <div class="final-val" id="res-final"></div>
    </div>
</div>

<script>
    function procesarCalculo() {
        const b = parseFloat(document.getElementById('base').value);
        const h = parseFloat(document.getElementById('altura').value);
        const resArea = document.getElementById('resultado-area');

        if (isNaN(b) || isNaN(h)) {
            alert("Por favor, ingresa números válidos.");
            return;
        }

        // Vibración táctil para celular
        if (navigator.vibrate) {
            navigator.vibrate(40);
        }

        const area = (b * h) / 2;

        // Actualizar sustitución usando formato LaTeX para MathJax
        const sustitucionDiv = document.getElementById('f-sustitucion');
        sustitucionDiv.innerHTML = `\\[ A = \\frac{${b} \\times ${h}}{2} = \\frac{${b * h}}{2} \\]`;

        // Actualizar resultado final
        document.getElementById('res-final').innerText = `${area} cm²`;

        // Mostrar el cuadro de resultados
        resArea.style.display = 'block';

        // Pedirle a MathJax que procese las nuevas fórmulas añadidas por JS
        MathJax.typesetPromise();
    }
</script>

</body>
  </html>
